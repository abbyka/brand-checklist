<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>品牌行銷 0→100 自我檢查表</title>
<style>
  :root{
    --bg:#EEF2F1;
    --bg-grid: rgba(51,88,125,0.07);
    --ink:#1B3358;
    --ink-soft:#5B6B7C;
    --line:#33587D;
    --accent:#E29A3D;
    --danger:#B3402E;
    --header-bg:#122238;
    --header-ink:#EAF3F7;
    --header-ink-dim:rgba(234,243,247,0.62);
    --card-bg:#FFFFFF;
    --card-border:rgba(27,51,88,0.13);
    --radius:12px;
    --font-cjk:"PingFang HK","Microsoft JhengHei","Noto Sans TC",system-ui,-apple-system,"Segoe UI",sans-serif;
    --font-mono: ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--bg);
    background-image:
      repeating-linear-gradient(0deg, var(--bg-grid) 0 1px, transparent 1px 34px),
      repeating-linear-gradient(90deg, var(--bg-grid) 0 1px, transparent 1px 34px);
    color:var(--ink);
    font-family:var(--font-cjk);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .ruler{height:6px;background:repeating-linear-gradient(90deg, var(--accent) 0 1px, transparent 1px 13px);opacity:.55;}
  .app{max-width:900px;margin:0 auto;padding-bottom:72px;}

  .hero{background:var(--header-bg);color:var(--header-ink);padding:36px 22px 30px;position:relative;overflow:hidden;}
  .hero:before,.hero:after{content:'+';position:absolute;font-family:var(--font-mono);font-size:14px;color:var(--header-ink-dim);opacity:.5;}
  .hero:before{top:14px;left:16px;}
  .hero:after{bottom:14px;right:16px;}
  .biz-switcher{position:absolute;top:18px;right:20px;z-index:2;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .biz-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--header-ink-dim);}
  .biz-switcher select{font-family:var(--font-mono);font-size:12.5px;background:rgba(234,243,247,.1);color:var(--header-ink);border:1px solid rgba(234,243,247,.35);border-radius:8px;padding:6px 10px;cursor:pointer;}
  .biz-switcher select:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  #bizNameTag{color:var(--accent);font-weight:700;}
  .hero-inner{max-width:760px;margin:0 auto;position:relative;z-index:1;}
  .eyebrow{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--header-ink-dim);margin:0 0 14px;}
  h1{font-size:clamp(26px,5vw,38px);line-height:1.2;margin:0 0 8px;font-weight:700;letter-spacing:-.01em;}
  h1 .accent{color:var(--accent);}
  .sub{color:var(--header-ink-dim);margin:0 0 22px;font-size:13.5px;}

  .progress-track{position:relative;height:12px;border-radius:999px;background:rgba(234,243,247,0.14);overflow:hidden;
    background-image:repeating-linear-gradient(90deg, rgba(234,243,247,0.22) 0 1px, transparent 1px calc(10% - 1px));
  }
  .progress-fill{height:100%;width:0%;background:var(--accent);border-radius:999px;transition:width .4s ease;}
  .progress-label{font-family:var(--font-mono);font-size:12.5px;color:var(--header-ink-dim);margin-top:10px;}
  .progress-label b{color:var(--header-ink);font-weight:600;}

  .today-nudge{font-size:13px;margin:12px 0 0;padding:9px 13px;border-radius:8px;background:rgba(226,154,61,.16);color:var(--accent);border:1px solid rgba(226,154,61,.4);display:none;}
  .today-nudge.show{display:block;}
  .filter-row{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
  .filter-btn{font-family:var(--font-mono);font-size:12px;background:rgba(234,243,247,.08);border:1px solid rgba(234,243,247,.32);color:var(--header-ink-dim);padding:8px 15px;border-radius:999px;cursor:pointer;transition:background .15s,color .15s;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:var(--header-bg);font-weight:700;}
  .filter-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .controls{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .ctrl-btn{font-family:var(--font-mono);font-size:12px;background:transparent;border:1px solid rgba(234,243,247,.32);color:var(--header-ink);padding:8px 15px;border-radius:999px;cursor:pointer;transition:background .15s;}
  .ctrl-btn:hover{background:rgba(234,243,247,.12);}
  .ctrl-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .ctrl-btn--danger{border-color:rgba(226,154,61,.55);color:var(--accent);}

  .reset-confirm{margin-top:14px;font-size:12.5px;background:rgba(226,154,61,.14);border:1px solid rgba(226,154,61,.45);padding:11px 15px;border-radius:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .reset-confirm.hidden{display:none;}
  .reset-confirm button{font-family:var(--font-mono);font-size:12px;padding:6px 13px;border-radius:999px;border:1px solid currentColor;background:transparent;cursor:pointer;}
  #resetConfirmYes{color:var(--accent);}
  #resetConfirmNo{color:var(--header-ink-dim);}


  .categories{padding:22px 20px 0;}

  .cat{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);margin-bottom:13px;}
  .cat.filtered-empty{display:none;}
  .cat-head{display:flex;align-items:center;gap:13px;padding:15px 17px;cursor:pointer;user-select:none;}
  .cat-code{font-family:var(--font-mono);font-weight:700;font-size:12.5px;width:27px;height:27px;border:1.5px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--line);flex-shrink:0;}
  .cat-titlewrap{flex:1;min-width:0;}
  .cat-title{font-weight:600;font-size:14.5px;margin:0 0 6px;}
  .cat-bar-mini{height:4px;background:rgba(27,51,88,.08);border-radius:999px;overflow:hidden;}
  .cat-bar-mini-fill{height:100%;background:var(--accent);width:0%;transition:width .3s ease;}
  .cat-frac{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);white-space:nowrap;flex-shrink:0;}
  .cat-chevron{flex-shrink:0;transition:transform .2s ease;color:var(--ink-soft);}
  .cat.expanded .cat-chevron{transform:rotate(90deg);}

  .cat-body{display:none;padding:2px 17px 15px;}
  .cat.expanded .cat-body{display:block;}

  .task-item{padding:10px 0;border-top:1px solid rgba(27,51,88,.07);}
  .task-item:first-of-type{border-top:none;}
  .task-item.filtered-hide{display:none;}
  .task-row{position:relative;display:block;padding:0 0 0 32px;cursor:pointer;}
  .chk{position:absolute;left:0;top:1px;width:20px;height:20px;opacity:0;margin:0;cursor:pointer;z-index:2;}
  .box{position:absolute;left:0;top:1px;width:20px;height:20px;border:1.5px solid var(--line);border-radius:5px;background:#fff;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:background .15s,border-color .15s;}
  .box svg{width:12px;height:12px;color:var(--header-bg);opacity:0;transform:scale(.5);transition:opacity .15s,transform .18s cubic-bezier(.34,1.56,.64,1);}
  .chk:checked + .box{background:var(--accent);border-color:var(--accent);}
  .chk:checked + .box svg{opacity:1;transform:scale(1);}
  .chk:focus-visible + .box{outline:2px solid var(--accent);outline-offset:2px;}
  .task-text{font-size:13.8px;color:var(--ink);transition:color .15s;}
  .chk:checked ~ .task-text{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:rgba(27,51,88,.35);}
  .freq-pill{display:inline-block;margin-left:8px;font-family:var(--font-mono);font-size:10.8px;color:var(--line);background:rgba(51,88,125,.08);padding:2px 8px;border-radius:999px;white-space:nowrap;vertical-align:middle;}

  .recur-meta{margin:6px 0 0 32px;font-family:var(--font-mono);font-size:11.3px;color:var(--ink-soft);display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .recur-meta [data-meta].tier-soon{color:var(--accent);font-weight:600;}
  .recur-meta [data-meta].tier-overdue{color:var(--danger);font-weight:700;}
  .history-link{background:none;border:none;padding:0;font-family:var(--font-mono);font-size:11px;color:var(--line);text-decoration:underline;cursor:pointer;}
  .history-list{margin:6px 0 0 32px;font-size:11.5px;color:var(--ink-soft);}
  .history-list.hidden{display:none;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }

  .foot{text-align:center;color:var(--ink-soft);font-size:12px;padding:26px 20px 0;}

  @media (max-width:480px){
    .hero{padding:28px 16px 24px;}
    .categories{padding:16px 12px 0;}
    .cat-head{padding:13px 14px;}
    .filter-btn{font-size:11px;padding:7px 12px;}
    .ctrl-btn{font-size:11px;padding:7px 12px;}
    .task-item{padding:11px 0;}
    .chk,.box{width:22px;height:22px;}
    .task-row{padding-left:34px;}
    .recur-meta,.history-list{margin-left:34px;}
  }
</style>
</head>
<body>
<div class="ruler"></div>
<div class="app">
  <header class="hero">
    <div class="biz-switcher">
      <label for="bizSelect" class="biz-label">BUSINESS</label>
      <select id="bizSelect"></select>
    </div>
    <div class="hero-inner">
      <p class="eyebrow">BRAND BUILD-OUT · 品牌行銷全案 · <span id="bizNameTag"></span></p>
      <h1>由 0 到 100<br><span class="accent">自我檢查表</span></h1>
      <p class="sub">一次性同要重複做嘅嘢而家合埋一齊剔。剔一次會記低今日日期;循環任務過咗週期會自動打返做「未剔」提你再做,一次性嘅剔咗就會一直留低。🔗 呢個係實時共享版:大家開嗰下睇緊、剔緊同一份,即時同步。⚠️ 冇登入機制,呢條link淨係應該分享俾你信任嘅人,唔好公開派街。</p>
      <div class="progress-track"><div class="progress-fill" id="overallFill"></div></div>
      <p class="progress-label" id="overallLabel">載入緊…</p>
      <p class="today-nudge" id="todayNudge"></p>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="all" type="button">全部</button>
        <button class="filter-btn" data-filter="due" type="button">而家要做</button>
        <button class="filter-btn" data-filter="overdue" type="button">已過期</button>
        <button class="filter-btn" data-filter="1" type="button">每日</button>
        <button class="filter-btn" data-filter="3" type="button">每幾日</button>
        <button class="filter-btn" data-filter="7" type="button">每星期</button>
        <button class="filter-btn" data-filter="14" type="button">每兩星期</button>
        <button class="filter-btn" data-filter="21" type="button">每3星期</button>
        <button class="filter-btn" data-filter="30" type="button">每月</button>
        <button class="filter-btn" data-filter="90" type="button">每幾個月</button>
        <button class="filter-btn" data-filter="182" type="button">每半年</button>
        <button class="filter-btn" data-filter="365" type="button">一年</button>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="expandAllBtn" type="button">全部展開</button>
        <button class="ctrl-btn" id="collapseAllBtn" type="button">全部收起</button>
        <button class="ctrl-btn ctrl-btn--danger" id="resetBtn" type="button">重置進度</button>
      </div>
      <div class="reset-confirm hidden" id="resetConfirm">
        <span>確定要清除所有已剔選同紀錄?呢個動作冇得還原。</span>
        <button id="resetConfirmYes" type="button">確定清除</button>
        <button id="resetConfirmNo" type="button">取消</button>
      </div>
    </div>
  </header>

  <main class="categories" id="categories"></main>
  <p class="foot">剔嘅嘢自動save落你個account,唔會同人分享。跟住個頻率持續做,個 marketing engine 就會一直運轉落去。</p>
</div>

  function getBusinessFromURL(){
    try{
      var params = new URLSearchParams(window.location.search);
      var b = params.get('biz');
      if(b && BUSINESSES.some(function(x){ return x.id === b; })) return b;
    }catch(e){}
    return null;
  }
  function getBusinessFromLocalStorage(){
    try{
      var b = localStorage.getItem('brand_checklist_last_biz');
      if(b && BUSINESSES.some(function(x){ return x.id === b; })) return b;
    }catch(e){}
    return null;
  }
  var currentBusiness = getBusinessFromURL() || getBusinessFromLocalStorage() || BUSINESSES[0].id;

  function businessName(id){
    var b = BUSINESSES.filter(function(x){ return x.id === id; })[0];
    return b ? b.name : id;
  }

  var historyState = {};
  var totalCount = 0;
  var filterMode = 'all';
  DATA.forEach(function(cat){ totalCount += cat.items.length; });

  var categoriesEl = document.getElementById('categories');
  var overallFillEl = document.getElementById('overallFill');
  var overallLabelEl = document.getElementById('overallLabel');

  function todayISO(){
    var d = new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth()+1).padStart(2,'0');
    var day = String(d.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + day;
  }
  function daysBetween(isoA, isoB){
    var a = new Date(isoA + 'T00:00:00');
    var b = new Date(isoB + 'T00:00:00');
    return Math.round((b - a) / 86400000);
  }
  function niceDate(iso){
    var parts = iso.split('-');
    return parseInt(parts[1],10) + '月' + parseInt(parts[2],10) + '日';
  }

  function getHistory(id){
    return (historyState[id] && historyState[id].history) || [];
  }
  function deriveChecked(id, cadenceDays){
    var hist = getHistory(id);
    if(!hist.length) return false;
    if(cadenceDays === null || cadenceDays === undefined) return true;
    var last = hist[hist.length-1];
    var since = daysBetween(last, todayISO());
    return since < cadenceDays;
  }
  function metaInfo(id, cadenceDays){
    var hist = getHistory(id);
    if(!hist.length){
      return {text:'未做過', tier:'overdue'};
    }
    var last = hist[hist.length-1];
    var since = daysBetween(last, todayISO());
    if(since < 0) since = 0;
    var base = '上次: ' + niceDate(last) + '(' + since + ' 日前)';
    if(since >= cadenceDays){
      var over = since - cadenceDays;
      return {text:'已過期 ' + over + ' 日 · ' + base, tier:'overdue'};
    }
    var remain = cadenceDays - since;
    var warnZone = Math.max(1, Math.round(cadenceDays * 0.3));
    if(remain <= warnZone){
      return {text: base + ' · 仲有 ' + remain + ' 日到期', tier:'soon'};
    }
    return {text: base, tier:'ok'};
  }
  function isOverdue(id, cadenceDays){
    if(cadenceDays === null || cadenceDays === undefined) return false;
    return metaInfo(id, cadenceDays).tier === 'overdue';
  }

  function checkIcon(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 17 20 6"></polyline></svg>';
  }

  function findItem(id){
    for(var i=0;i<DATA.length;i++){
      for(var j=0;j<DATA[i].items.length;j++){
        if(DATA[i].items[j].id === id) return DATA[i].items[j];
      }
    }
    return null;
  }

  function buildDOM(){
    DATA.forEach(function(cat, idx){
      var catEl = document.createElement('section');
      catEl.className = 'cat' + (idx === 0 ? ' expanded' : '');
      catEl.dataset.code = cat.code;

      var head = document.createElement('div');
      head.className = 'cat-head';
      head.innerHTML =
        '<span class="cat-code">' + cat.code + '</span>' +
        '<span class="cat-titlewrap">' +
          '<p class="cat-title">' + cat.title + '</p>' +
          '<span class="cat-bar-mini"><span class="cat-bar-mini-fill"></span></span>' +
        '</span>' +
        '<span class="cat-frac">0/' + cat.items.length + '</span>' +
        '<span class="cat-chevron">&#9656;</span>';
      head.addEventListener('click', function(){
        catEl.classList.toggle('expanded');
      });
      catEl.appendChild(head);

      var body = document.createElement('div');
      body.className = 'cat-body';

      cat.items.forEach(function(item){
        var wrap = document.createElement('div');
        wrap.className = 'task-item';
        wrap.dataset.id = item.id;

        var row = document.createElement('label');
        row.className = 'task-row';
        row.innerHTML =
          '<input type="checkbox" class="chk" data-id="' + item.id + '">' +
          '<span class="box">' + checkIcon() + '</span>' +
          '<span class="task-text">' + item.t + '</span>' +
          '<span class="freq-pill">' + item.f + '</span>';
        wrap.appendChild(row);

        if(item.d !== null && item.d !== undefined){
          var meta = document.createElement('div');
          meta.className = 'recur-meta';
          meta.innerHTML = '<span data-meta></span><button type="button" class="history-link" data-history-toggle>歷史</button>';
          wrap.appendChild(meta);

          var hist = document.createElement('div');
          hist.className = 'history-list hidden';
          hist.setAttribute('data-history-list','');
          wrap.appendChild(hist);
        }

        body.appendChild(wrap);
      });

      catEl.appendChild(body);
      categoriesEl.appendChild(catEl);
    });
  }

  function renderItem(item){
    var wrap = categoriesEl.querySelector('.task-item[data-id="'+item.id+'"]');
    if(!wrap) return;
    var checked = deriveChecked(item.id, item.d);
    var chk = wrap.querySelector('.chk');
    chk.checked = checked;
    if(item.d !== null && item.d !== undefined){
      var metaSpan = wrap.querySelector('[data-meta]');
      if(metaSpan){
        var info = metaInfo(item.id, item.d);
        metaSpan.textContent = info.text;
        metaSpan.className = info.tier === 'soon' ? 'tier-soon' : (info.tier === 'overdue' ? 'tier-overdue' : '');
      }
      var histListEl = wrap.querySelector('[data-history-list]');
      if(histListEl){
        var hist = getHistory(item.id).slice().reverse();
        histListEl.innerHTML = hist.length ?
          ('最近 3 次:<br>' + hist.slice(0,3).map(niceDate).join('、')) :
          '仲未有完成紀錄。';
      }
    }
    var hide = false;
    if(filterMode === 'due'){
      hide = checked;
    } else if(filterMode === 'overdue'){
      hide = !(item.d !== null && item.d !== undefined && isOverdue(item.id, item.d));
    } else if(filterMode !== 'all'){
      var targetDays = parseInt(filterMode, 10);
      hide = (item.d !== targetDays);
    }
    wrap.classList.toggle('filtered-hide', hide);
  }

  function updateCategoryUI(code){
    var cat = null;
    for (var i=0;i<DATA.length;i++){ if(DATA[i].code===code){ cat=DATA[i]; break; } }
    if(!cat) return;
    var done = cat.items.filter(function(it){ return deriveChecked(it.id, it.d); }).length;
    var catEl = categoriesEl.querySelector('.cat[data-code="'+code+'"]');
    if(!catEl) return;
    catEl.querySelector('.cat-frac').textContent = done + '/' + cat.items.length;
    var pct = cat.items.length ? Math.round(done/cat.items.length*100) : 0;
    catEl.querySelector('.cat-bar-mini-fill').style.width = pct + '%';

    var visibleCount;
    if(filterMode === 'all'){
      visibleCount = cat.items.length;
    } else if(filterMode === 'due'){
      visibleCount = cat.items.filter(function(it){ return !deriveChecked(it.id, it.d); }).length;
    } else if(filterMode === 'overdue'){
      visibleCount = cat.items.filter(function(it){ return it.d !== null && it.d !== undefined && isOverdue(it.id, it.d); }).length;
    } else {
      var targetDays2 = parseInt(filterMode, 10);
      visibleCount = cat.items.filter(function(it){ return it.d === targetDays2; }).length;
    }
    catEl.classList.toggle('filtered-empty', visibleCount === 0);
    if(filterMode !== 'all' && visibleCount > 0){
      catEl.classList.add('expanded');
    }
  }

  function updateOverallUI(){
    var done = 0;
    DATA.forEach(function(cat){
      cat.items.forEach(function(it){ if(deriveChecked(it.id, it.d)) done++; });
    });
    var pct = totalCount ? Math.round(done/totalCount*100) : 0;
    overallFillEl.style.width = pct + '%';
    var msg = '<b>' + done + ' / ' + totalCount + '</b> 完成 · ' + pct + '%';
    if(pct === 100 && totalCount > 0){ msg += ' · 🎉 全部搞掂!'; }
    overallLabelEl.innerHTML = msg;
  }

  function updateTodayNudge(){
    var dueDaily = 0, dueWeekly = 0;
    DATA.forEach(function(cat){
      cat.items.forEach(function(it){
        if(deriveChecked(it.id, it.d)) return;
        if(it.d === 1) dueDaily++;
        else if(it.d === 3 || it.d === 7) dueWeekly++;
      });
    });
    var nudgeEl = document.getElementById('todayNudge');
    if(!nudgeEl) return;
    if(dueDaily === 0 && dueWeekly === 0){
      nudgeEl.classList.remove('show');
      return;
    }
    var parts = [];
    if(dueDaily > 0) parts.push('今日 ' + dueDaily + ' 項');
    if(dueWeekly > 0) parts.push('本星期 ' + dueWeekly + ' 項');
    nudgeEl.textContent = '⏰ ' + parts.join(' · ') + ' 未剔 —— 撳「而家要做」睇晒佢哋';
    nudgeEl.classList.add('show');
  }

  function renderAll(){
    DATA.forEach(function(cat){
      cat.items.forEach(function(it){ renderItem(it); });
      updateCategoryUI(cat.code);
    });
    updateOverallUI();
    updateTodayNudge();
  }

  function persistTask(id){
    if(!sbClient) return;
    try{
      sbClient.from('checklist_state').upsert({
        business_id: currentBusiness,
        task_id: id,
        history: getHistory(id),
        updated_at: new Date().toISOString()
      }).then(function(res){
        if(res && res.error){ console.error('Supabase upsert error:', res.error); }
      });
    }catch(e){ console.error(e); }
  }

  categoriesEl.addEventListener('click', function(e){
    var histBtn = e.target.closest('[data-history-toggle]');
    if(histBtn){
      e.preventDefault();
      e.stopPropagation();
      var wrap = histBtn.closest('.task-item');
      var listEl = wrap.querySelector('[data-history-list]');
      listEl.classList.toggle('hidden');
    }
  });

  categoriesEl.addEventListener('change', function(e){
    if(!e.target.classList.contains('chk')) return;
    var id = e.target.dataset.id;
    var item = findItem(id);
    if(!item) return;
    var nowChecked = e.target.checked;
    if(!historyState[id]) historyState[id] = {history:[]};
    var hist = historyState[id].history;
    if(nowChecked){
      var today = todayISO();
      if(hist[hist.length-1] !== today){ hist.push(today); }
    } else {
      if(hist.length){ hist.pop(); }
    }
    renderItem(item);
    updateCategoryUI(item.__cat || id.match(/^[A-Za-z]+/)[0]);
    updateOverallUI();
    persistTask(id);
  });

  function applyRowToState(row){
    if(!row || !row.task_id || row.business_id !== currentBusiness) return;
    historyState[row.task_id] = { history: row.history || [] };
    var item = findItem(row.task_id);
    if(item){
      renderItem(item);
      updateCategoryUI(row.task_id.match(/^[A-Za-z]+/)[0]);
      updateOverallUI();
      updateTodayNudge();
    }
  }

  function subscribeRealtimeForBusiness(){
    if(!sbClient) return;
    if(sbChannel){ sbClient.removeChannel(sbChannel); sbChannel = null; }
    sbChannel = sbClient
      .channel('checklist-changes-' + currentBusiness)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'checklist_state',
        filter: 'business_id=eq.' + currentBusiness
      }, function(payload){
        if(payload.eventType === 'DELETE'){
          historyState = {};
          renderAll();
          return;
        }
        applyRowToState(payload.new);
      })
      .subscribe();
  }

  function loadBusinessData(){
    if(!sbClient){ renderAll(); return; }
    sbClient.from('checklist_state').select('*').eq('business_id', currentBusiness).then(function(res){
      historyState = {};
      if(res && res.data){
        res.data.forEach(function(row){
          historyState[row.task_id] = { history: row.history || [] };
        });
      }
      renderAll();
    });
    subscribeRealtimeForBusiness();
  }

  function setBusiness(id){
    if(!BUSINESSES.some(function(x){ return x.id === id; })) return;
    currentBusiness = id;
    try{ localStorage.setItem('brand_checklist_last_biz', id); }catch(e){}
    try{
      var url = new URL(window.location.href);
      url.searchParams.set('biz', id);
      window.history.replaceState({}, '', url);
    }catch(e){}
    var tagEl = document.getElementById('bizNameTag');
    if(tagEl) tagEl.textContent = businessName(id);
    filterMode = 'all';
    filterRowEl.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    var allBtn = filterRowEl.querySelector('[data-filter="all"]');
    if(allBtn) allBtn.classList.add('active');
    categoriesEl.querySelectorAll('.cat').forEach(function(c, idx){
      c.classList.toggle('expanded', idx === 0);
    });
    loadBusinessData();
  }

  var bizSelectEl = document.getElementById('bizSelect');
  BUSINESSES.forEach(function(b){
    var opt = document.createElement('option');
    opt.value = b.id;
    opt.textContent = b.name;
    bizSelectEl.appendChild(opt);
  });
  bizSelectEl.value = currentBusiness;
  document.getElementById('bizNameTag').textContent = businessName(currentBusiness);
  bizSelectEl.addEventListener('change', function(){ setBusiness(this.value); });

  (function initSupabase(){
    if(typeof supabase === 'undefined' || !SUPABASE_URL || SUPABASE_URL.indexOf('PASTE_') === 0){
      console.warn('Supabase 未設定:請將 SUPABASE_URL / SUPABASE_ANON_KEY 換成你自己個project嘅資料。');
      renderAll();
      return;
    }
    sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    loadBusinessData();
  })();
})();
</script>
</body>
</html>
